;;; /etc/asterisk/extensions.conf

[from-internal]
; Existing catch-all (Keep this if you need it for inbound)
exten => _X.,1,NoOp(Routing all calls to Pipecat)
 same => n,Dial(WebSocket/pipecat/c(slin16)f(json))
 same => n,Hangup()

; Specific extension for your Python script to target
exten => start_pipecat,1,NoOp(Bridging outbound call to Pipecat)
 same => n,Answer()
 ; This plays a beep or silence so the user knows the line is open while WS connects
 same => n,Playback(beep) 
 same => n,Dial(WebSocket/pipecat/c(slin16)f(json))
 same => n,Hangup()
